<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 400" width="100%" height="100%">
  <defs>
    <!-- Background Gradient -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0f0c1b"/>
      <stop offset="50%" stop-color="#15102a"/>
      <stop offset="100%" stop-color="#051f2d"/>
    </linearGradient>

    <!-- Text / Glow Gradient -->
    <linearGradient id="accentGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#a855f7"/>
      <stop offset="50%" stop-color="#ec4899"/>
      <stop offset="100%" stop-color="#3b82f6"/>
    </linearGradient>

    <!-- Circular Glow Filters -->
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="60" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
    
    <filter id="textGlow" x="-10%" y="-10%" width="120%" height="120%">
      <feGaussianBlur stdDeviation="8" result="blur" />
      <feComponentTransfer in="blur" result="brightBlur">
        <feFuncA type="linear" slope="0.6"/>
      </feComponentTransfer>
      <feMerge>
        <feMergeNode in="brightBlur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="400" fill="url(#bgGrad)"/>

  <!-- Ambient Glow Elements -->
  <circle cx="100" cy="100" r="120" fill="#a855f7" opacity="0.25" filter="url(#glow)"/>
  <circle cx="1100" cy="300" r="150" fill="#3b82f6" opacity="0.2" filter="url(#glow)"/>
  <circle cx="600" cy="200" r="100" fill="#ec4899" opacity="0.15" filter="url(#glow)"/>

  <!-- Grid overlay for tech aesthetic -->
  <g opacity="0.05">
    <path d="M 0,50 L 1200,50 M 0,100 L 1200,100 M 0,150 L 1200,150 M 0,200 L 1200,200 M 0,250 L 1200,250 M 0,300 L 1200,300 M 0,350 L 1200,350" stroke="#ffffff" stroke-width="1"/>
    <path d="M 100,0 L 100,400 M 200,0 L 200,400 M 300,0 L 300,400 M 400,0 L 400,400 M 500,0 L 500,400 M 600,0 L 600,400 M 700,0 L 700,400 M 800,0 L 800,400 M 900,0 L 900,400 M 1000,0 L 1000,400 M 1100,0 L 1100,400" stroke="#ffffff" stroke-width="1"/>
  </g>

  <!-- Decorative Rings / Geometry -->
  <circle cx="600" cy="200" r="180" fill="none" stroke="url(#accentGrad)" stroke-width="1.5" stroke-dasharray="10 15" opacity="0.4"/>
  <circle cx="600" cy="200" r="190" fill="none" stroke="#3b82f6" stroke-width="0.5" opacity="0.3"/>
  <circle cx="600" cy="200" r="170" fill="none" stroke="#a855f7" stroke-width="0.5" opacity="0.3"/>

  <!-- Title & Subtitle -->
  <g text-anchor="middle" font-family="'Segoe UI', Roboto, 'Helvetica Neue', sans-serif">
    <!-- Category Badge -->
    <rect x="520" y="65" width="160" height="28" rx="14" fill="#a855f7" opacity="0.2"/>
    <rect x="520" y="65" width="160" height="28" rx="14" fill="none" stroke="#a855f7" stroke-width="1" opacity="0.8"/>
    <text x="600" y="83" fill="#e9d5ff" font-size="12" font-weight="bold" letter-spacing="2">CURATED LIST</text>

    <!-- Main Title -->
    <text x="600" y="180" fill="url(#accentGrad)" font-size="52" font-weight="900" letter-spacing="4" filter="url(#textGlow)">AWESOME TEXT-TO-IMAGE</text>
    
    <!-- Subtitle -->
    <text x="600" y="240" fill="#ffffff" font-size="20" font-weight="300" letter-spacing="8" opacity="0.9">EVOLUTION · ARCHITECTURES · APPLICATIONS</text>

    <!-- Tech specs / Details -->
    <text x="600" y="310" fill="#94a3b8" font-size="14" font-weight="400" letter-spacing="1">GANs · LATENT DIFFUSION · DIFFUSION TRANSFORMERS · FLOW MATCHING</text>
  </g>
</svg>
